<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vector Garden</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Eagle+Lake&family=Pinyon+Script&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <!-- VERCEL ANALYTICS after deploying go to Vercel Dashboard → Analytics → Enable -->
  <!-- Then paste the <script> snippet Vercel gives you here -->
</head>
<body>

  <!-- LOADING SCREEN single firefly blinks until user interacts -->
  <div id="loading">
    <canvas id="loader-canvas"></canvas>
  </div>

  <!-- TITLE fades in after user enters, then fades out -->
  <div id="title-overlay">
    <h1>Vector Garden</h1>
  </div>

  <!-- MAIN CANVAS -->
  <canvas id="garden"></canvas>

  <script type="module" src="src/main.js"></script>
</body>
</html>
